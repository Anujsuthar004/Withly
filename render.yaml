services:
  - type: web
    name: tag-along
    runtime: node
    plan: starter
    autoDeploy: true
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: APP_ENV
        value: production
      - key: STORAGE_DRIVER
        value: postgres
      - key: AUTH_REQUIRED
        value: "true"
      - key: EXPOSE_DEV_AUTH_CODES
        value: "false"
      - key: TOKEN_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: BOOTSTRAP_ADMIN_EMAIL
        sync: false
      - key: EMAIL_PROVIDER
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: POSTMARK_SERVER_TOKEN
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
